<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Dance HK - 暑期班登記系統</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div id="formSection" class="card">
            <h2>暑期班精選優惠登記</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="studentName">學生姓名</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label for="course">選擇暑期優惠</label>
                    <select id="course" required>
                        <option value="">請選擇...</option>
                        <option value="暑期精選優惠 A">暑期精選優惠 A</option>
                        <option value="暑期精選優惠 B">暑期精選優惠 B</option>
                        <option value="暑期精選優惠 C">暑期精選優惠 C</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">提交登記</button>
            </form>
        </div>

        <div id="successSection" class="card hidden">
            <div class="success-icon">✓</div>
            <h2>登記只差一步完成！</h2>
            
            <div class="highlight-box">
                <p>資料已安全備份。<br><strong>建議您點擊下方按鈕，直接透過 WhatsApp 發送登記資料給我們</strong>，以確保最快為您跟進處理！</p>
            </div>
            
            <button id="whatsappBtn" class="whatsapp-btn">
                傳送登記資料至 WhatsApp
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
